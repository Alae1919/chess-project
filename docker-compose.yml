version: '3.8'

services:
  db:
    image: postgres:15
    container_name: chess_db
    environment:
      POSTGRES_DB: chess_db
      POSTGRES_USER: chess_user
      POSTGRES_PASSWORD: chess_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess_user -d chess_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./chess-engine
      dockerfile: Dockerfile
    container_name: chess_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/chess_db
      - SPRING_DATASOURCE_USERNAME=chess_user
      - SPRING_DATASOURCE_PASSWORD=chess_pass
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chess_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:

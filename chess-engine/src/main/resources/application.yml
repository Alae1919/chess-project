
spring:
  application:
    name: chess-engine

  datasource:
    url: jdbc:postgresql://localhost:5432/chess_db
    username: chess_user
    password: chess_pass
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: "CHANGE_THIS_TO_A_256_BIT_RANDOM_SECRET_IN_PRODUCTION"
  access-token-expiry-ms: 900000        # 15 minutes
  refresh-token-expiry-ms: 604800000    # 7 days

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.chess: DEBUG
    org.hibernate.SQL: DEBUG
